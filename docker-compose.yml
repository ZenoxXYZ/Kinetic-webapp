services:
  postgres:
    image: postgres:16-alpine
    container_name: kinetic-academy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kinetic_academy
      POSTGRES_USER: kinetic
      POSTGRES_PASSWORD: kinetic
    ports:
      - "5432:5432"
    volumes:
      - kinetic_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinetic -d kinetic_academy"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kinetic_postgres_data:
